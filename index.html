<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>MI TELEVISIÓN CLÁSICA FAMILIAR</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- AVPlay Video Surface -->
    <object id="av-player" type="application/avplayer"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; z-index:1;">
    </object>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="logo-container">
            <img src="images/channel_logo.png" alt="MI TELEVISIÓN CLÁSICA FAMILIAR">
        </div>
        <div class="app-title">Mi Televisión Clásica Familiar</div>
        <div class="spinner"></div>
        <div class="ver-en-vivo">VER EN VIVO</div>
    </div>

    <!-- Top Bar Overlay -->
    <div id="top-bar">
        <img src="images/channel_logo.png" alt="MI TELEVISIÓN CLÁSICA FAMILIAR" class="logo-small">
        <span class="channel-name">MI TELEVISIÓN CLÁSICA FAMILIAR</span>
        <span class="live-badge">LIVE</span>
        <span class="clock" id="clock"></span>
    </div>

    <!-- Bottom Bar - Control Hints -->
    <div id="bottom-bar">
        <div class="control-hint">
            <span class="key-icon">OK</span>
            <span>Play / Pause</span>
        </div>
        <div class="control-hint">
            <span class="key-icon">&#9654;&#10074;&#10074;</span>
            <span>Play / Pause</span>
        </div>
        <div class="control-hint">
            <span class="key-icon">&#8592;</span>
            <span>Back</span>
        </div>
    </div>

    <!-- Buffering Overlay -->
    <div id="buffering-overlay">
        <div class="spinner"></div>
        <div class="buffering-text">Buffering...</div>
        <div class="buffering-percent" id="buffering-percent"></div>
    </div>

    <!-- Pause Indicator -->
    <div id="pause-indicator">
        <svg viewBox="0 0 24 24">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
        </svg>
    </div>

    <!-- Error / Network Popup -->
    <div id="error-popup">
        <div class="error-icon">&#9888;</div>
        <div class="error-title" id="error-title">Connection Lost</div>
        <div class="error-message" id="error-message">
            Please check your internet connection and try again.
        </div>
        <div class="error-buttons">
            <button class="popup-btn focused" id="btn-retry">Retry</button>
            <button class="popup-btn" id="btn-exit-error">Exit</button>
        </div>
    </div>

    <!-- Exit Confirmation Popup -->
    <div id="exit-popup">
        <div class="exit-title">Exit MI TELEVISIÓN CLÁSICA FAMILIAR?</div>
        <div class="exit-message">Are you sure you want to exit?</div>
        <div class="exit-buttons">
            <button class="popup-btn focused" id="btn-no">No</button>
            <button class="popup-btn" id="btn-yes">Yes</button>
        </div>
    </div>

    <script src="js/app.js"></script>

</body>
</html>
